<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Diffs Extension</title>
    <style>
      body {
        width: 280px;
        margin: 0;
        padding: 14px;
        font:
          13px system-ui,
          sans-serif;
        color: #111;
      }

      label {
        display: block;
        margin: 10px 0 4px;
        font-weight: 600;
      }

      input,
      select,
      button {
        box-sizing: border-box;
        width: 100%;
        font: inherit;
      }

      input,
      select {
        padding: 7px;
      }

      button {
        margin-top: 8px;
        padding: 7px;
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .row input {
        width: auto;
      }

      #status {
        min-height: 18px;
        margin-top: 8px;
        color: #555;
      }

      .stored-token {
        display: block;
        margin-bottom: 4px;
        overflow-wrap: anywhere;
        color: #555;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="row">
      <strong>Diffs Extension</strong>
      <label class="row">
        <span>On</span>
        <input id="enabled" type="checkbox" />
      </label>
    </div>

    <label for="target">Target</label>
    <select id="target">
      <option value="prod">Production</option>
      <option value="local">Local dev</option>
    </select>

    <label for="prod-token">Production PAT</label>
    <code id="prod-token-display" class="stored-token">Not saved</code>
    <input id="prod-token" type="password" autocomplete="off" />
    <button id="prod-save" type="button">Save Production PAT</button>
    <button id="prod-clear" type="button">Clear Production PAT</button>

    <label for="local-token">Dev PAT</label>
    <code id="local-token-display" class="stored-token">Not saved</code>
    <input id="local-token" type="password" autocomplete="off" />
    <button id="local-save" type="button">Save Dev PAT</button>
    <button id="local-clear" type="button">Clear Dev PAT</button>

    <button id="shortcut" type="button">Set Keyboard Shortcut</button>
    <p id="status"></p>
    <p id="shortcut-status"></p>

    <script type="module" src="./popup.js"></script>
  </body>
</html>
